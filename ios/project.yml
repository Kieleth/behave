name: Behave
options:
  bundleIdPrefix: com.kieleth
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: DS84U364XL
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Behave:
    type: application
    platform: iOS
    sources:
      - path: Behave
    settings:
      base:
        INFOPLIST_FILE: Behave/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kieleth.behave
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Behave/Resources/Info.plist
      properties:
        CFBundleName: Behave
        CFBundleDisplayName: Behave
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSCameraUsageDescription: "Behave analyzes your posture, expressions, and habits on-device. No images are stored or transmitted."
        NSSpeechRecognitionUsageDescription: "Behave analyzes speech patterns on-device. No audio is stored or transmitted."
        NSMicrophoneUsageDescription: "Behave analyzes speech pace and filler words on-device. No audio is stored or transmitted."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
