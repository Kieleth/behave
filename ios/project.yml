name: Behave
options:
  bundleIdPrefix: com.kieleth
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Behave:
    type: application
    platform: iOS
    sources:
      - path: Behave
    settings:
      base:
        INFOPLIST_FILE: Behave/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kieleth.behave
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Behave/Resources/Info.plist
      properties:
        CFBundleName: Behave
        CFBundleDisplayName: Behave
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSCameraUsageDescription: "Behave uses the camera to analyze your posture, facial expressions, and habits to help you improve."
        NSSpeechRecognitionUsageDescription: "Behave uses speech recognition to analyze your speaking patterns and suggest improvements."
        NSMicrophoneUsageDescription: "Behave uses the microphone to analyze your speech pace, volume, and filler words."
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: "Behave uses Face ID for secure authentication."
